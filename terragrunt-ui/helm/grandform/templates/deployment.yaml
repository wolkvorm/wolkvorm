apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-backend
  labels:
    app: {{ .Release.Name }}
    component: backend
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
      component: backend
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
        component: backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.port }}
          env:
            - name: GITHUB_APP_ID
              value: "{{ .Values.backend.env.GITHUB_APP_ID }}"
            - name: SCHEMAS_DIR
              value: "{{ .Values.backend.env.SCHEMAS_DIR }}"
          volumeMounts:
            - name: schemas
              mountPath: /schemas
            - name: github-pem
              mountPath: /app/github-app.pem
              subPath: github-app.pem
              readOnly: true
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
      volumes:
        - name: schemas
          configMap:
            name: {{ .Release.Name }}-schemas
        - name: github-pem
          secret:
            secretName: {{ .Values.github.appPemSecret }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-frontend
  labels:
    app: {{ .Release.Name }}
    component: frontend
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
      component: frontend
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
        component: frontend
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.frontend.port }}
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
