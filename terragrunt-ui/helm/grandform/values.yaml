replicaCount: 1

backend:
  image:
    repository: grandform-backend
    tag: latest
    pullPolicy: IfNotPresent
  port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  env:
    GITHUB_APP_ID: ""
    SCHEMAS_DIR: "/schemas"

frontend:
  image:
    repository: grandform-frontend
    tag: latest
    pullPolicy: IfNotPresent
  port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

runner:
  image:
    repository: grandform-runner
    tag: latest
    pullPolicy: IfNotPresent

ingress:
  enabled: false
  className: nginx
  host: grandform.example.com
  tls: false

serviceAccount:
  create: true
  name: ""

github:
  appPemSecret: grandform-github-pem
