apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  labels:
    {{- include "terraforge.labels" . | nindent 4 }}
type: Opaque
stringData:
  encryption-key: {{ .Values.secrets.encryptionKey | default "terraforge-default-secret-key-change-in-production" | quote }}
  {{- if .Values.secrets.aws.accessKeyId }}
  aws-access-key-id: {{ .Values.secrets.aws.accessKeyId | quote }}
  {{- end }}
  {{- if .Values.secrets.aws.secretAccessKey }}
  aws-secret-access-key: {{ .Values.secrets.aws.secretAccessKey | quote }}
  {{- end }}
