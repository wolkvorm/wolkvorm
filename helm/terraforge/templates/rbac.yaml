{{- if .Values.serviceAccount.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-runner
  labels:
    {{- include "terraforge.labels" . | nindent 4 }}
rules:
  # Manage Jobs for terragrunt execution
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  # Manage ConfigMaps for HCL files
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "get", "delete"]
  # Read pod info and stream logs
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-runner
  labels:
    {{- include "terraforge.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-runner
subjects:
  - kind: ServiceAccount
    name: {{ include "terraforge.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
